name: nani1

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Display Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t myapp:latest .

      - name: Verify Docker Image
        run: docker images
